<style>
  .service-hero-animation {
    padding: 1.8em;
    contain: layout;
  }
 
  .trk { width: 100%; }
 
  /* ---- Chart ---- */
  .trk-chart {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 0.7em;
    height: 170px;
    padding: 1em 0.3em 0;
  }
 
  .trk-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
    gap: 0.45em;
  }
 
  .trk-bar {
    width: 100%;
    max-width: 38px;
    background: var(--color-brand);
    border-radius: 4px 4px 0 0;
    height: 10%;
    transition: height .7s cubic-bezier(.4,0,.2,1), background-color .5s ease;
  }
 
  .trk-bar-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--color-brand-dark);
    opacity: .7;
  }
 
  .trk-channels {
    display: flex;
    justify-content: center;
    gap: 0.8em;
    margin-bottom: 1.3em;
  }
 
  .trk-chan {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
    border: 1.5px solid var(--color-border-light);
    color: #b8b8b8;
    font-weight: 700;
    transition: transform .35s ease, border-color .35s ease, color .35s ease, background-color .35s ease, box-shadow .35s ease;
  }
  .trk-chan svg { width: 20px; height: 20px; display: block; }
 
  .trk-chan.active {
    transform: scale(1.18) translateY(-3px);
    border-color: var(--color-accent);
    background: var(--color-accent);
    color: #fff;
    box-shadow: 0 6px 16px rgba(184,93,37,.28);
  }
 
  @media (prefers-reduced-motion: reduce) {
    .trk-bar, .trk-chan { transition: none; }
  }

@media (max-width: 768px) {

	.service-hero-animation {
		padding: 0em;
	}
}
</style>
 
  <div class="service-hero-animation">
    <div class="trk" id="trk">
      <div class="trk-channels">
        <div class="trk-chan" data-chan="0" aria-label="Google">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-3.5-7.1"/><line x1="21" y1="5" x2="21" y2="11"/><line x1="15" y1="11" x2="21" y2="11"/>
          </svg>
        </div>
        <div class="trk-chan" data-chan="1" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="trk-chan" data-chan="2" aria-label="Mail">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>
          </svg>
        </div>
        <div class="trk-chan" data-chan="3" aria-label="YouTube">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round">
            <rect x="2.5" y="5" width="19" height="14" rx="4"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="trk-chan" data-chan="4" aria-label="QR">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="21"/><line x1="18" y1="14" x2="18" y2="18"/><line x1="21" y1="17" x2="21" y2="21"/>
          </svg>
        </div>
      </div>
      <div class="trk-chart">
        <div class="trk-bar-wrap"><div class="trk-bar" data-bar="0"></div><span class="trk-bar-label">Visit</span></div>
        <div class="trk-bar-wrap"><div class="trk-bar" data-bar="1"></div><span class="trk-bar-label">Scroll</span></div>
        <div class="trk-bar-wrap"><div class="trk-bar" data-bar="2"></div><span class="trk-bar-label">Mail</span></div>
        <div class="trk-bar-wrap"><div class="trk-bar" data-bar="3"></div><span class="trk-bar-label">Tel</span></div>
        <div class="trk-bar-wrap"><div class="trk-bar" data-bar="4"></div><span class="trk-bar-label">Lead</span></div>
      </div>
    </div>
  </div>
 
<script src="/assets/js/animations/tracking-hero.js" defer></script>
