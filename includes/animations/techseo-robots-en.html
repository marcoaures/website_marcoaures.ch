<style>
  .rb-window {
    width: 100%;
    box-sizing: border-box;
    background: #fff;
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
    overflow: hidden;
  }
  .rb-bar {
    background: var(--color-brand);
    height: 30px;
    display: flex; align-items: center;
    padding: 0 10px; gap: 6px;
  }
  .rb-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.55); }
  .rb-file {
    font-family: var(--font-ui);
    font-size: .72rem; font-weight: 700; color: #fff; opacity: .92;
  }

  .rb-body {
    padding: 1em 1.1em;
    box-sizing: border-box;
    width: 100%;
    font-family: var(--font-mono);
    line-height: 1.7;
    color: var(--color-text-main);
    min-height: 210px;
    overflow-x: hidden;
    font-size: .8rem;
  }

  .rb-line { white-space: pre; display: block; }

  .rb-spacer {
    display: block;
    white-space: pre;
    height: 0;
    overflow: hidden;
    visibility: hidden;
  }
  .rb-comment { color: #9a9a9a; }
  .rb-key { color: var(--color-brand); font-weight: 700; }
  .rb-val { color: var(--color-accent); }

  .rb-line { visibility: hidden; }
  .rb-line.show { visibility: visible; }

  .rb-caret {
    display: inline-block; width: .55em; height: 1.05em;
    background: var(--color-accent); vertical-align: -2px;
    margin-left: 1px; animation: blink .9s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  @media (prefers-reduced-motion: reduce) {
    .rb-line { visibility: visible; }
    .rb-caret { display: none; }
  }

  @media only screen and (max-width: 768px) {
	.rb-body {
    font-size: .64rem;
	}
}
</style>

<div class="service-hero-animation">
  <div id="rb">
    <div class="rb-window">
      <div class="rb-bar">
        <span class="rb-file">robots.txt</span>
      </div>
      <div class="rb-body" id="rbBody"><span class="rb-spacer" aria-hidden="true">Sitemap: https://yourwebsite.ch/sitemap-index.xml</span></div>
    </div>
  </div>
</div>

<script src="/assets/js/animations/techseo-robots-en.js" defer></script>
