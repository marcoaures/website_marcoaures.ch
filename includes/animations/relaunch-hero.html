<style>
#gl {
width: 75%;
height: 100%;
  display: flex;
  align-items: center;     /* vertical centering */
  justify-content: center; /* horizontal, if width isn't 100% */
  }
.gl-svg { width: 100%; height: auto; display: block; }
  .gl-axis { stroke: var(--color-border-light); stroke-width: 1.5; }
  .gl-grid { stroke: var(--color-border-light); stroke-width: 1; opacity: .4; }
  .gl-line {
    fill: none; stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: var(--len); stroke-dashoffset: var(--len);
  }
  .gl-line.teal   { stroke: var(--color-brand); }
  .gl-line.accent { stroke: var(--color-accent); }
  .is-go .gl-line.teal   { animation: draw 2.6s ease forwards; }
  .is-go .gl-line.accent { animation: draw 3.2s ease .25s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  /* Go-Live vertical guide + marker */
  .gl-guide {
    stroke: var(--color-accent); stroke-width: 1.5; stroke-dasharray: 4 4;
    opacity: 0; transition: opacity .4s ease;
  }
  .gl-guide.show { opacity: .7; }
  .gl-marker {
    fill: #fff; stroke: var(--color-accent); stroke-width: 2.5;
    transform-box: fill-box; transform-origin: center; transform: scale(0);
  }
  .gl-marker.show { animation: pop .4s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes pop { to { transform: scale(1); } }
  .gl-tag {
    fill: var(--color-accent); rx: 4;
    opacity: 0; transition: opacity .4s ease;
  }
  .gl-tag.show { opacity: 1; }
  .gl-tagtext {
    font-family: var(--font-ui); font-size: 12px; font-weight: 700; fill: #fff;
    opacity: 0; transition: opacity .4s ease;
  }
  .gl-tagtext.show { opacity: 1; }
  @media (prefers-reduced-motion: reduce) {
    .gl-line { stroke-dashoffset: 0; animation: none; }
    .gl-area { opacity: .08; animation: none; }
    .gl-guide, .gl-tag, .gl-tagtext { opacity: 1; }
    .gl-marker { transform: scale(1); animation: none; }
  }
@media (max-width: 768px) {
#gl {
width: 95%;
  }
}
</style>
<div class="service-hero-animation">
  <div id="gl">
	<svg class="gl-svg" viewBox="0 0 440 200" aria-label="Suchleistung mit Go-Live-Zeitpunkt">
	  <line class="gl-grid" x1="4" y1="40" x2="416" y2="40"></line>
	  <line class="gl-grid" x1="4" y1="100" x2="416" y2="100"></line>
	  <line class="gl-grid" x1="4" y1="160" x2="416" y2="160"></line>
	  <line class="gl-axis" x1="4" y1="4" x2="4" y2="200"></line>
	  <line class="gl-axis" x1="4" y1="200" x2="416" y2="200"></line>
	  <!-- Go-Live guide at x=170 -->
	  <line class="gl-guide" id="glGuide" x1="170" y1="10" x2="170" y2="200"></line>
	  <path class="gl-line teal" id="glLineA" d="M4,176 L38,168 L72,180 L106,162 L140,172 L170,158 L204,130 L238,142 L272,100 L306,114 L340,72 L374,84 L410,50"></path>
	  <path class="gl-line accent" id="glLineB" d="M4,190 L38,185 L72,192 L106,180 L140,188 L170,178 L204,166 L238,176 L272,150 L306,162 L340,130 L374,144 L410,114"></path>
	  <!-- Go-Live tag + marker at (170,158) -->
	  <rect class="gl-tag" id="glTag" x="132" y="0" width="76" height="22" rx="4"></rect>
	  <text class="gl-tagtext" id="glTagText" x="170" y="15" text-anchor="middle">Go-Live</text>
	</svg>
  </div>
</div>
<script src="/assets/js/animations/relaunch-hero.js" defer></script>
