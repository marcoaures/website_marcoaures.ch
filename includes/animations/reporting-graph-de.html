<style>
.rep { width: 100%; display: block; }

  .rep-axis { stroke: var(--color-border-light); stroke-width: 1.5; }
  .rep-grid { stroke: var(--color-border-light); stroke-width: 1; opacity: .4; }

  .rep-line {
    fill: none;
    stroke: var(--color-brand);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: var(--len);
    stroke-dashoffset: var(--len);
  }
  .is-visible .rep-line { animation: drawLine 3.2s ease forwards; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }

  .rep-area { fill: var(--color-brand); opacity: 0; }
  .is-visible .rep-area { animation: fadeArea .8s ease 2.8s forwards; }
  @keyframes fadeArea { to { opacity: .08; } }

  .rep-marker {
    fill: #fff; stroke: var(--color-accent); stroke-width: 2.5;
    transform-box: fill-box; transform-origin: center; transform: scale(0);
  }
  .rep-marker.show { animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards; }

  .rep-event {
    fill: #fff; stroke: var(--color-brand-dark); stroke-width: 2;
    transform-box: fill-box; transform-origin: center; transform: scale(0);
  }
  .rep-event.show { animation: popIn .4s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes popIn { to { transform: scale(1); } }

  .rep-leader { stroke-width: 1.5; stroke-dasharray: var(--llen); stroke-dashoffset: var(--llen); }
  .rep-leader.accent { stroke: var(--color-accent); }
  .rep-leader.dark { stroke: var(--color-brand-dark); }
  .rep-leader.show { animation: drawLeader .4s ease forwards; }
  @keyframes drawLeader { to { stroke-dashoffset: 0; } }

  .rep-label { font-family: var(--font-ui); font-size: 12px; font-weight: 700; opacity: 0; }
  .rep-label.accent { fill: var(--color-accent); }
  .rep-label.dark { fill: var(--color-brand-dark); }
  .rep-label.show { animation: fadeLabel .4s ease forwards; }
  @keyframes fadeLabel { to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .rep-line { stroke-dashoffset: 0; animation: none; }
    .rep-area { opacity: .08; animation: none; }
    .rep-marker, .rep-event { transform: scale(1); animation: none; }
    .rep-leader { stroke-dashoffset: 0; animation: none; }
    .rep-label { opacity: 1; animation: none; }
  }
</style>

<div class="service-hero-animation">
<svg class="rep" id="rep" viewBox="0 0 500 320" aria-label="Kennzahlenentwicklung mit Massnahmen und Ereignissen">

  <line class="rep-grid" x1="44" y1="70"  x2="470" y2="70"/>
  <line class="rep-grid" x1="44" y1="140" x2="470" y2="140"/>
  <line class="rep-grid" x1="44" y1="210" x2="470" y2="210"/>

  <line class="rep-axis" x1="44" y1="30" x2="44" y2="270"/>
  <line class="rep-axis" x1="44" y1="270" x2="470" y2="270"/>

  <path class="rep-area" id="area"
        d="M44,235 L90,220 L130,225 L175,140 L215,165 L255,205 L300,110 L340,135 L380,200 L420,80 L460,60 L460,270 L44,270 Z"/>
  <path class="rep-line" id="line"
        d="M44,235 L90,220 L130,225 L175,140 L215,165 L255,205 L300,110 L340,135 L380,200 L420,80 L460,60"/>

  <g id="annotations">
    <line class="rep-leader accent" data-step="0" x1="130" y1="225" x2="130" y2="140"/>
    <text class="rep-label accent" data-step="0" x="130" y="132" text-anchor="middle">Massnahme 1</text>
    <circle class="rep-marker" data-step="0" cx="130" cy="225" r="7"/>

    <line class="rep-leader dark" data-step="1" x1="215" y1="165" x2="215" y2="110"/>
    <text class="rep-label dark" data-step="1" x="215" y="102" text-anchor="middle">Ereignis A</text>
    <circle class="rep-event" data-step="1" cx="215" cy="165" r="5.5"/>

    <line class="rep-leader accent" data-step="2" x1="255" y1="205" x2="255" y2="245"/>
    <text class="rep-label accent" data-step="2" x="255" y="259" text-anchor="middle">Massnahme 2</text>
    <circle class="rep-marker" data-step="2" cx="255" cy="205" r="7"/>

    <line class="rep-leader dark" data-step="3" x1="340" y1="135" x2="340" y2="82"/>
    <text class="rep-label dark" data-step="3" x="340" y="74" text-anchor="middle">Ereignis B</text>
    <circle class="rep-event" data-step="3" cx="340" cy="135" r="5.5"/>

    <line class="rep-leader accent" data-step="4" x1="380" y1="200" x2="380" y2="240"/>
    <text class="rep-label accent" data-step="4" x="380" y="254" text-anchor="middle">Massnahme 3</text>
    <circle class="rep-marker" data-step="4" cx="380" cy="200" r="7"/>
  </g>
</svg>
</div>
