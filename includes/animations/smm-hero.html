<style>
.smm-hero-animation .orbit {
  --r1: 117px;
  --r2: 162px;
  --r3: 207px;
  --speed: 9s;

  position: relative;
  width: 380px;
  height: 380px;
  max-width: 100%;
  margin: 0 auto;
}

.smm-hero-animation .ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 1px dotted var(--color-border-light);
  border-radius: 50%;
  box-sizing: border-box;
}

.smm-hero-animation .ring.r1 {
  width: calc(var(--r1) * 1.70);
  height: calc(var(--r1) * 1.70);
}

.smm-hero-animation .ring.r2 {
  width: calc(var(--r2) * 1.76);
  height: calc(var(--r2) * 1.76);
}

.smm-hero-animation .ring.r3 {
  width: calc(var(--r3) * 1.80);
  height: calc(var(--r3) * 1.80);
}

.smm-hero-animation .window {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 40px;
  background: #fff;
  border: 2px solid var(--color-brand-dark, #284a4b);
  border-radius: 6px;
  box-shadow: 0 6px 16px rgba(0,0,0,.08);
  overflow: hidden;
  z-index: 3;
}

.smm-hero-animation .window::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 11px;
  background: var(--color-brand, #427b7d);
}

.smm-hero-animation .window::after {
  content: "";
  position: absolute;
  top: 4px;
  left: 5px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #fff;
}

.smm-hero-animation .orbiter {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  margin: -15px 0 0 -15px;
  animation: smmHeroOrbit var(--speed) linear infinite;
}

.smm-hero-animation .orbiter.o1 {
  transform-origin: 15px var(--r1);
  top: calc(50% - var(--r1) + 15px);
}

.smm-hero-animation .orbiter.o2 {
  transform-origin: 15px var(--r2);
  top: calc(50% - var(--r2) + 15px);
  animation-delay: calc(var(--speed) / -3);
}

.smm-hero-animation .orbiter.o3 {
  transform-origin: 15px var(--r3);
  top: calc(50% - var(--r3) + 15px);
  animation-delay: calc(var(--speed) / -1.5);
}

@keyframes smmHeroOrbit {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.smm-hero-animation .meta,
.smm-hero-animation .li,
.smm-hero-animation .bing {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  animation: smmHeroOrbitRev var(--speed) linear infinite;
}

.smm-hero-animation .meta svg,
.smm-hero-animation .li svg {
  display: block;
  width: 100px;
  height: 100px;
}

.smm-hero-animation .bing svg {
  display: block;
  width: 80px;
  height: 80px;
}

.smm-hero-animation .o1 .meta {
  animation-delay: 0s;
}

.smm-hero-animation .o2 .li {
  animation-delay: calc(var(--speed) / -3);
}

.smm-hero-animation .o3 .bing {
  animation-delay: calc(var(--speed) / -1.5);
}

@keyframes smmHeroOrbitRev {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}

@media (prefers-reduced-motion: reduce) {
  .smm-hero-animation .orbiter,
  .smm-hero-animation .meta,
  .smm-hero-animation .li,
  .smm-hero-animation .bing {
    animation: none;
  }
}

@media (max-width: 768px) {
.smm-hero-animation .orbit {
  --r1: 78px;
  --r2: 108px;
  --r3: 138px;
  width: 300px;
  height: 300px;
}
.smm-hero-animation .meta, .smm-hero-animation .li, .smm-hero-animation .bing {
    width: 28px;
	}
}
</style>
