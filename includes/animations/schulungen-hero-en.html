<style>
  .service-hero-animation:has(.slot-icons) {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .slot-icons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.1em;
    width: max-content;
    margin: 0 auto 1.4em;
  }
  #slotIconsBottom { margin: 1.4em auto 0; }
  .slot-icon {
    width: 64px;
    height: 64px;
    display: block;
  }
  .slot-icon svg { width: 100%; height: 100%; display: block; }
  .slot-icon svg .slot-icon-fill {
    fill: var(--color-brand);
    opacity: .45;
    transition: fill .5s ease, opacity .5s ease;
  }
  .slot-icon.active svg .slot-icon-fill {
    fill: var(--color-accent);
    opacity: 1;
  }

.slot-line {
    --row-h: 60px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: .6em;
    font-size: 1.6rem; font-weight: 800; color: var(--color-brand-dark);
	margin-top: 0.6em;
  }
  .slot-static {
    white-space: nowrap;
    background: var(--color-brand);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    padding: .35em .9em;
    border-radius: 999px;
  }

  .slot-window {
    position: relative;
    height: var(--row-h);
    overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%);
  }

  .slot-reel {
    display: flex; flex-direction: column;
    will-change: transform;
  }
  .slot-item {
    height: var(--row-h);
    display: flex; align-items: center; justify-content: center;
    white-space: nowrap;
    color: var(--color-accent);
    font-weight: 800;
  }

  @media (prefers-reduced-motion: reduce) {
    .slot-reel { transition: none !important; }
  }
</style>
