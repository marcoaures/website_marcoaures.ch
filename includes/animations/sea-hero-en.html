<style>
  .sea-anim { width: 100%; font-family: var(--font-ui); }

  .sea-bar {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.6em;
    background: #fff;
    border: 1px solid var(--color-border-light);
    border-radius: 999px;
    padding: 0.7em 1.1em;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    overflow: hidden;
  }
  .sea-bar svg { flex: 0 0 auto; }

  .sea-query {
    font-size: 0.95rem;
    color: var(--color-text-main);
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid var(--color-accent);
    width: 0;
  }

  .sea-results { margin-top: 0.9em; display: flex; flex-direction: column; gap: 0.55em; }

  .sea-result {
    background: #fff;
    border-radius: var(--radius-sm);
    border: 1px solid var(--color-border-light);
    padding: 0.7em 0.9em;
    opacity: 0;
    transform: translateY(8px);
  }
  .sea-result.is-highlight {
    border-color: var(--color-accent);
    box-shadow: 0 2px 10px rgba(184,93,37,.12);
  }

  .sea-highlight-label {
    display: inline-block;
    font-size: 0.6rem; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: #fff;
    background: var(--color-accent); border-radius: 3px;
    padding: 1px 5px; margin-bottom: 0.4em;
  }

  .sea-line { height: 7px; border-radius: 4px; background: #e3e3e3; margin: 5px 0; }
  .sea-line.title { background: var(--color-brand); width: 70%; height: 9px; }
  .sea-line.w90 { width: 90%; }
  .sea-line.w60 { width: 60%; }

  .sea-anim .is-visible .sea-query,
  #tile.is-visible .sea-query {
    animation:
      typing 1.5s steps(var(--sea-steps, 18), end) 0.3s forwards,
      caret 0.7s step-end 4;
  }

  #tile.is-visible .sea-result {
    animation: resultIn 0.45s cubic-bezier(.22,1,.36,1) forwards;
  }
  #tile.is-visible .sea-result:nth-child(1) { animation-delay: 1.9s; }
  #tile.is-visible .sea-result:nth-child(2) { animation-delay: 2.15s; }
  #tile.is-visible .sea-result:nth-child(3) { animation-delay: 2.4s; }

  @keyframes typing { from { width: 0; } to { width: var(--sea-width, 14ch); } }
  @keyframes caret { 50% { border-color: transparent; } }
  @keyframes resultIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .sea-query { width: var(--sea-width, 14ch); border-right: none; animation: none; }
    .sea-result { opacity: 1; transform: none; animation: none; }
  }
</style>

<div class="service-hero-animation" id="tile">
  <div class="sea-anim">
    <div class="sea-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.5" y2="16.5"/>
      </svg>
      <span class="sea-query" data-text="google ads freelancer switzerland"></span>
    </div>
    <div class="sea-results">
      <div class="sea-result is-highlight">
        <span class="sea-highlight-label">Sponsored</span>
        <div class="sea-line title"></div>
        <div class="sea-line w90"></div>
        <div class="sea-line w60"></div>
      </div>
      <div class="sea-result">
        <div class="sea-line title"></div>
        <div class="sea-line w90"></div>
      </div>
      <div class="sea-result">
        <div class="sea-line title"></div>
        <div class="sea-line w60"></div>
      </div>
    </div>
  </div>
</div>

<script src="/assets/js/animations/sea-hero.js" defer></script>
